<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif" role="img" aria-label="LLM-driven development lifecycle: Development, Test, Staging, Production in a continuous loop">
  <defs>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f88ff"/>
      <stop offset="0.5" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#2f88ff"/>
    </linearGradient>
    <radialGradient id="pulseGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f88ff"/>
    </marker>
    <!-- the continuous loop path the energy dot travels -->
    <path id="loop" d="M120,105 H780 C835,105 835,235 780,235 H120 C65,235 65,105 120,105 Z" fill="none"/>
  </defs>

  <!-- backdrop -->
  <rect x="1" y="1" width="898" height="298" rx="16" fill="#0d1117" stroke="#21262d" stroke-width="1.5"/>

  <!-- visible track -->
  <use href="#loop" stroke="url(#track)" stroke-width="2.4" stroke-dasharray="1 8" stroke-linecap="round" opacity="0.55">
    <animate attributeName="stroke-dashoffset" values="0;-90" dur="3s" repeatCount="indefinite"/>
  </use>

  <!-- forward connector arrows -->
  <g stroke="#2f88ff" stroke-width="2.4" marker-end="url(#arrow)">
    <line x1="200" y1="105" x2="258" y2="105"/>
    <line x1="420" y1="105" x2="478" y2="105"/>
    <line x1="640" y1="105" x2="698" y2="105"/>
  </g>

  <!-- return-loop label -->
  <text x="450" y="262" text-anchor="middle" fill="#7d8590" font-size="13" font-style="italic">↺ AI-assisted feedback loop — review, test &amp; ship, continuously</text>

  <!-- ============ STAGE NODES ============ -->
  <!-- 1 Development -->
  <g>
    <rect x="45" y="70" width="150" height="70" rx="12" fill="#161b22" stroke="#2f88ff" stroke-width="1.6"/>
    <rect x="45" y="70" width="150" height="70" rx="12" fill="none" stroke="#58a6ff" stroke-width="2.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.5;1" dur="6s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="120" y="102" text-anchor="middle" font-size="17" fill="#e6edf3" font-weight="700">💻 Development</text>
    <text x="120" y="123" text-anchor="middle" font-size="11.5" fill="#7d8590">LLM pair-programming</text>
  </g>
  <!-- 2 Test -->
  <g>
    <rect x="265" y="70" width="150" height="70" rx="12" fill="#161b22" stroke="#2f88ff" stroke-width="1.6"/>
    <rect x="265" y="70" width="150" height="70" rx="12" fill="none" stroke="#58a6ff" stroke-width="2.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.5;1" dur="6s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <text x="340" y="102" text-anchor="middle" font-size="17" fill="#e6edf3" font-weight="700">🧪 Test</text>
    <text x="340" y="123" text-anchor="middle" font-size="11.5" fill="#7d8590">AI suites + bug triage</text>
  </g>
  <!-- 3 Staging -->
  <g>
    <rect x="485" y="70" width="150" height="70" rx="12" fill="#161b22" stroke="#2f88ff" stroke-width="1.6"/>
    <rect x="485" y="70" width="150" height="70" rx="12" fill="none" stroke="#58a6ff" stroke-width="2.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.5;1" dur="6s" begin="3s" repeatCount="indefinite"/>
    </rect>
    <text x="560" y="102" text-anchor="middle" font-size="17" fill="#e6edf3" font-weight="700">🚦 Staging</text>
    <text x="560" y="123" text-anchor="middle" font-size="11.5" fill="#7d8590">LLM review + security</text>
  </g>
  <!-- 4 Production -->
  <g>
    <rect x="705" y="70" width="150" height="70" rx="12" fill="#161b22" stroke="#2f88ff" stroke-width="1.6"/>
    <rect x="705" y="70" width="150" height="70" rx="12" fill="none" stroke="#58a6ff" stroke-width="2.4" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.5;1" dur="6s" begin="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="780" y="102" text-anchor="middle" font-size="17" fill="#e6edf3" font-weight="700">🚀 Production</text>
    <text x="780" y="123" text-anchor="middle" font-size="11.5" fill="#7d8590">AI CI/CD + incidents</text>
  </g>

  <!-- ============ TRAVELLING ENERGY DOT ============ -->
  <circle r="16" fill="url(#pulseGrad)">
    <animateMotion dur="6s" repeatCount="indefinite" rotate="0">
      <mpath href="#loop"/>
    </animateMotion>
  </circle>
  <circle r="5.5" fill="#58a6ff" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" rotate="0">
      <mpath href="#loop"/>
    </animateMotion>
  </circle>
</svg>
